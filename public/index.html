<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LUXURYWATER</title>
<style>
html{scroll-behavior:smooth}
body{margin:0;padding:0;font-family:'Noto Sans JP',sans-serif;background:#f9fafb}
.header{position:sticky;top:0;z-index:50;display:flex;height:72px;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1a1a1a 0%,#2d2416 100%);padding:0 40px;box-shadow:0 4px 20px rgba(212,175,55,0.3);backdrop-filter:blur(12px);border-bottom:2px solid #d4af37}
.header-logo{font-size:1.75rem;font-weight:900;color:#d4af37;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.header-cta{display:inline-block;background:linear-gradient(135deg,#d4af37 0%,#f4d03f 100%);color:#1a1a1a;padding:12px 32px;border-radius:9999px;font-size:0.95rem;font-weight:800;text-decoration:none;box-shadow:0 4px 15px rgba(212,175,55,0.4);transition:all 0.3s ease;border:2px solid #d4af37}
.header-cta:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.6)}
.main-content{width:100%;background:#fff}
.footer{background:linear-gradient(135deg,#1a1a1a 0%,#2d2416 100%);padding:48px 32px;text-align:center;color:#d4af37;font-size:0.875rem;border-top:2px solid #d4af37}
.footer p{margin:0;opacity:0.8}

/* モーダル */
.modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.7);overflow:auto}
.modal-content{background:linear-gradient(135deg,#fff 0%,#f9f6f2 100%);margin:5% auto;padding:0;border-radius:12px;width:90%;max-width:600px;box-shadow:0 10px 60px rgba(212,175,55,0.5);border:2px solid #d4af37;animation:slideIn 0.3s ease}
@keyframes slideIn{from{transform:translateY(-50px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{background:linear-gradient(135deg,#d4af37 0%,#f4d03f 100%);padding:24px 32px;border-bottom:2px solid #d4af37;display:flex;justify-content:space-between;align-items:center;border-radius:10px 10px 0 0}
.modal-header h2{margin:0;color:#1a1a1a;font-size:1.5rem;font-weight:900}
.close{color:#1a1a1a;font-size:32px;font-weight:bold;cursor:pointer;transition:all 0.3s}
.close:hover{transform:scale(1.2)}
.modal-body{padding:40px 32px}
.form-group{margin-bottom:24px}
.form-label{display:block;margin-bottom:8px;color:#1a1a1a;font-weight:700;font-size:0.95rem}
.form-label .required{color:#d4af37;margin-left:4px}
.form-input{width:100%;padding:14px 16px;border:2px solid #d4af37;border-radius:8px;font-size:1rem;font-family:'Noto Sans JP',sans-serif;box-sizing:border-box;transition:all 0.3s}
.form-input:focus{outline:none;border-color:#f4d03f;box-shadow:0 0 0 3px rgba(212,175,55,0.2)}
.form-textarea{min-height:120px;resize:vertical}
.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#d4af37 0%,#f4d03f 100%);color:#1a1a1a;border:none;border-radius:8px;font-size:1.1rem;font-weight:900;cursor:pointer;transition:all 0.3s;box-shadow:0 6px 20px rgba(212,175,55,0.4);letter-spacing:1px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,175,55,0.6)}
.submit-btn:active{transform:translateY(0)}
.form-note{font-size:0.85rem;color:#666;margin-top:16px;text-align:center}

/* セクション */
section{position:relative;width:100%;overflow:hidden}
section img{display:block;width:100%;height:auto;filter:brightness(100%)grayscale(0%)}

/* モバイル対応 */
@media (max-width:768px){
  .header{height:56px;padding:0 16px;flex-wrap:wrap}
  .header-logo{font-size:1.25rem;letter-spacing:1px}
  .header-cta{padding:8px 16px;font-size:0.8rem}
  .modal-content{width:95%;margin:20% auto;padding:0}
  .modal-header{padding:16px}
  .modal-header h2{font-size:1.25rem}
  .modal-body{padding:24px 16px}
  .form-group{margin-bottom:16px}
  .form-input{padding:12px 14px;font-size:16px}
  .submit-btn{padding:14px;font-size:1rem}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">LUXURYWATER</div>
  <a href="#contactModal" class="header-cta" onclick="openModal(event)">お問い合わせ</a>
</header>

<main class="main-content">
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-hero-1776941726311-633452297.png" alt="LUXURYWATER" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-problem-1776941807726-845396940.png" alt="" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-solution-1776941885130-988913145.png" alt="" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-guarantee-1776942034052-345072824.png" alt="" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-pricing-1776942112360-177766855.png" alt="" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-offer-1776942185417-261240270.png" alt="" />
  </section>
  <section>
    <img src="https://jqpavdhxvmvuhwrbnosd.supabase.co/storage/v1/object/public/images/lp-cta-1776942262410-855822409.png" alt="" />
  </section>
</main>

<!-- お問い合わせモーダル -->
<div id="contactModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>お問い合わせ</h2>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>
    <div class="modal-body">
      <form id="contactForm" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label class="form-label">お名前<span class="required">*</span></label>
          <input type="text" class="form-input" name="name" required placeholder="例：山田太郎">
        </div>
        <div class="form-group">
          <label class="form-label">メールアドレス<span class="required">*</span></label>
          <input type="email" class="form-input" name="email" required placeholder="例：example@mail.com">
        </div>
        <div class="form-group">
          <label class="form-label">電話番号<span class="required">*</span></label>
          <input type="tel" class="form-input" name="phone" required placeholder="例：09012345678">
        </div>
        <div class="form-group">
          <label class="form-label">お問い合わせ内容<span class="required">*</span></label>
          <textarea class="form-input form-textarea" name="message" required placeholder="ご質問やご相談内容をお聞かせください"></textarea>
        </div>
        <button type="submit" class="submit-btn">送信する</button>
        <p class="form-note">※送信後、確認メールが届きます</p>
      </form>
    </div>
  </div>
</div>

<footer class="footer">
  <p>&copy; 2026 LUXURYWATER - Premium Water Solutions</p>
</footer>

<script>
function openModal(e){e.preventDefault();document.getElementById('contactModal').style.display='block';document.body.style.overflow='hidden'}
function closeModal(){document.getElementById('contactModal').style.display='none';document.body.style.overflow='auto'}
window.onclick=function(e){var modal=document.getElementById('contactModal');if(e.target===modal)closeModal()}
function handleSubmit(e){e.preventDefault();var name=document.querySelector('input[name="name"]').value;var email=document.querySelector('input[name="email"]').value;var phone=document.querySelector('input[name="phone"]').value;var message=document.querySelector('textarea[name="message"]').value;console.log('お問い合わせ内容:',{name,email,phone,message});alert('お問い合わせありがとうございます。\n確認メールを送信いたしました。');document.getElementById('contactForm').reset();closeModal()}
</script>

</body>
</html>
